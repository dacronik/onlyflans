{% extends 'base.html' %}

{% block 'content' %}
<div class="container">
    
    <div class="row">
        <div class="col mb-2">
            <div class="h-100 p-5 text-white bg-dark rounded-3" id="productos">
                <h1>
                    Bienvenido {{ user.get_username }}
                </h1>
                <h4>
                    Tenemos una lista de productos exclusivos para ti. ¿Quieres conocer más?
                </h4>
                <a href="{% url 'contacto' %}" class="btn btn-outline-light">
                    Contáctanos
                </a>
            </div>
        </div>
    </div>


    <div class="row p-3 m-2 justify-content-between">
        {% for flan in private_flans %}
        <div class="col-6 col-sm-12 col-md-3">
            <div class="card mb-4" style="height: 100%;">
                <img src="{{ flan.image_url }}" class="card-img-top" height="250">
                <div class="card-body p-3 border-0 pt-6">
                    <h5 class="card-title text-center">
                        {{ flan.name }}
                    </h5>
                    <p class="card-text">
                        {{ flan.description }}
                    </p>
                    <h3 class="h5 fw-bold text-end" style="color:#7f00b2">
                        {{ flan.precio }}
                    </h3>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>
{% endblock  %}
